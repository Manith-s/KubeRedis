apiVersion: v1
kind: Service
metadata:
  name: {{ include "kuberedis.kvstore.name" . }}
  labels:
    {{- include "kuberedis.kvstore.labels" . | nindent 4 }}
spec:
  type: {{ .Values.kvstore.service.type }}
  selector:
    {{- include "kuberedis.kvstore.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.kvstore.service.port }}
      targetPort: http
      protocol: TCP
      name: http
