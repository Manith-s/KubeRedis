apiVersion: v2
name: kuberedis
description: >-
  A Helm chart for deploying a Go key-value store API backed by a Redis
  cluster on Kubernetes. Includes the kvstore Deployment, Redis StatefulSet,
  headless Service, ConfigMaps, Secrets, and optional metrics exporter.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - redis
  - kvstore
  - kubernetes
  - statefulset
  - operator
maintainers:
  - name: shashankx86
home: https://github.com/shashankx86/kuberedis
